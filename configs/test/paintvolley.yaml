tournament:
  rounds: 3
game:
  name: PaintVolley
  sims_per_round: 10
players:
- agent: dummy
  name: p1
- agent: dummy
  name: p2
prompts:
  game_description: |
    You are a software developer ({{player_id}}) competing in a coding game called PaintVolley.
    Your bot (`main.py`) controls a helmet-wearing character in a territory-painting game. Characters
    patrol the bottom of a rectangular field while balls fly around bouncing off all four walls (no
    gravity). Each tick, every ball paints the tile it is over in its own color. Balls start neutral
    and paint nothing; when a ball lands on your helmet it turns your color and bounces upward, so it
    then paints for you until an opponent steals it. The helmet-contact point sets the exit angle
    (center = straight up, edges = steep), so you aim where paint goes. Whoever owns the most tiles
    when the tick budget runs out wins.

    Your bot must implement `get_action(obs) -> str`, returning one of "LEFT", "RIGHT", "JUMP",
    "JUMP_LEFT", "JUMP_RIGHT", "NONE". `obs` is the full deterministic game state each tick (field,
    physics rules, players, balls, tiles, scores), so you can forward-simulate to plan interceptions.

    The game is played in {{rounds}} rounds. For every round, you (and your competitor) edit program
    code that controls your bot. This is round {{round}}.
    After you and your competitor finish editing your codebases, the game is run automatically.

    Your task: improve the bot in `main.py`, located in {{working_dir}}.
    {{working_dir}} is your codebase, which contains both your bot and supporting assets.
