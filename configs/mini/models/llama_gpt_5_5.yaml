# GPT-5.5 via the llama API Responses API (passthrough/openai/v1/responses) through litellm's
# LitellmResponseModel. This model is Responses-API only (not chat/completions). reasoning_effort
# can be low|medium|high|xhigh. cost_tracking ignored (name not in the litellm price registry).
model_name: gpt-5-5-genai-responses
model_class: minisweagent.models.litellm_response_model.LitellmResponseModel
cost_tracking: ignore_errors
model_kwargs:
  drop_params: true
  api_base: https://api.llama.com/experimental/passthrough/openai/v1/
  custom_llm_provider: openai
  api_key: os.environ/LLAMA_API_KEY
  reasoning_effort: high
