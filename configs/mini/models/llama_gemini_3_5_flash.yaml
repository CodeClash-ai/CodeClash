# Gemini 3.5 Flash via the llama API OpenAI-compat (passthrough/openai) endpoint through stock
# litellm. Not Anthropic → no AnthropicModel. api_base points at the resolved endpoint directly
# (the shorter /compat/v1 path 307-redirects, which the openai client won't follow on POST).
# cost_tracking: ignore_errors because this gateway name isn't in the litellm price registry.
model_name: gemini-3-5-flash-fair
cost_tracking: ignore_errors
model_kwargs:
  drop_params: true
  api_base: https://api.llama.com/experimental/passthrough/openai/v1
  custom_llm_provider: openai
  api_key: os.environ/LLAMA_API_KEY
