# Claude Opus 4.8 via the llama API anthropic-passthrough endpoint (native Anthropic API →
# prompt caching preserved). API key comes from $LLAMA_API_KEY (.env); everything else is
# verbatim here. Cost is computed from the block below (no litellm price registry needed).
model_name: claude-4-8-opus-vertex-genai
model_class: codeclash.agents.mini_anthropic_model.AnthropicModel
api_key_env: LLAMA_API_KEY
base_url: https://api.llama.com/experimental/passthrough/anthropic
max_tokens: 16384
# NOTE: these gateway Claude models run with extended thinking enabled, which requires
# temperature to be unset (or 1.0). Setting temperature (e.g. 0.2) returns HTTP 400 — so no
# model_kwargs/temperature here.
cost:
  input: 5.0e-06
  output: 2.5e-05
  cache_creation_input: 6.25e-06
  cache_read_input: 5.0e-07
