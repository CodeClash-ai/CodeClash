# RobotRumble ladder, climbed by Claude served through a custom Anthropic-compatible endpoint.
#
# Identical to robotrumble.yaml except the climbing `player` uses the custom AnthropicModel,
# which talks native Anthropic API to a configurable base URL so prompt caching is preserved.
# Opponents are static human branches (no model).
#
# The endpoint, model id, and key are read from the environment (keeps them out of the config):
#   uv pip install -e '.[llama]'        # installs the `anthropic` dep
#   # in .env:
#   LLAMA_API_KEY=...        # API key
#   LLAMA_BASE_URL=...        # Anthropic-compatible base URL
#   LLAMA_MODEL=...           # model name served by that endpoint
#   uv run codeclash ladder run configs/ablations/ladder/robotrumble_llama.yaml
tournament:
  rounds: 5
game:
  name: RobotRumble
  sims_per_round: 250
  args:
    raw: false
player:
  agent: mini
  name: claude-gateway
  branch_init: human/anton/anton3000
  config:
    agent: !include mini/default.yaml
    model:
      model_class: codeclash.agents.mini_anthropic_model.AnthropicModel
      model_name: claude-gateway          # placeholder; real id comes from LLAMA_MODEL
      model_name_env: LLAMA_MODEL
      api_key_env: LLAMA_API_KEY
      base_url_env: LLAMA_BASE_URL
      max_tokens: 4096
      model_kwargs:
        temperature: 0.2
      cost:
        input: 5.0e-06
        output: 2.5e-05
        cache_creation_input: 6.25e-06
        cache_read_input: 5.0e-07
  push: True
prompts:
  game_description: |-
    RobotRumble ladder
